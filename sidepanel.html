<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Minted Panel Workbench</title>
  </head>
  <body>
    <header class="header">
      <span class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24">
            <g transform="rotate(14 12 12)" fill="#1E4B39">
              <g>
                <rect x="10.7" y="1.6" width="2.6" height="20.8" rx="1.3" />
                <circle cx="12" cy="2.8" r="2.2" />
                <circle cx="12" cy="21.2" r="2.2" />
              </g>
              <g transform="rotate(60 12 12)">
                <rect x="10.7" y="1.6" width="2.6" height="20.8" rx="1.3" />
                <circle cx="12" cy="2.8" r="2.2" />
                <circle cx="12" cy="21.2" r="2.2" />
              </g>
              <g transform="rotate(-60 12 12)">
                <rect x="10.7" y="1.6" width="2.6" height="20.8" rx="1.3" />
                <circle cx="12" cy="2.8" r="2.2" />
                <circle cx="12" cy="21.2" r="2.2" />
              </g>
            </g>
          </svg>
        </span>
        Minted Panel Workbench
      </span>
      <p id="account-email" class="account"></p>
      <button id="signout" class="link header-link" hidden>Sign out</button>
    </header>
    <main>
      <section id="view-loading" class="centered"><p class="hint">Loading…</p></section>

      <section id="view-signin" hidden>
        <h1>Sign in</h1>
        <p class="hint">Use your Minted Panel account.</p>
        <form id="signin-form">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" autocomplete="current-password" required />
          </div>
          <div id="signin-error" class="error" hidden></div>
          <button id="signin-btn" class="primary" type="submit">Sign in</button>
        </form>
      </section>

      <section id="view-main" hidden>
        <div class="field">
          <label for="org-select">Organization</label>
          <select id="org-select"></select>
        </div>
        <div id="provider-section" hidden>
          <div class="field">
            <div class="label-row">
              <label for="provider-select">Provider</label>
              <button id="refresh" class="link" type="button">Refresh</button>
            </div>
            <select id="provider-select"></select>
          </div>
        </div>
        <div id="main-error" class="error" hidden></div>
        <div id="provider-card" class="card" hidden>
          <div id="provider-name" class="provider-name"></div>
          <div id="provider-dob" class="provider-dob" hidden></div>
          <dl id="provider-ids" class="ids" hidden></dl>
        </div>

        <div id="fill-section" hidden>
          <div class="field">
            <label for="facility-select">Location</label>
            <select id="facility-select"></select>
            <p id="facility-hint" class="blocked-hint" hidden>Pick a location first.</p>
          </div>

          <div class="field">
            <div class="label-row">
              <label for="case-select" id="case-label">Case</label>
              <span id="case-status" class="pill" hidden></span>
            </div>
            <select id="case-select"></select>
            <p id="case-note" class="case-note" hidden></p>
          </div>

          <div id="case-context" class="case-context" hidden></div>

          <p id="portal-status" class="banner"></p>

          <div id="coverage-panel" class="coverage" hidden>
            <p id="coverage-count" class="coverage-count"></p>
            <ul id="coverage-gaps" class="coverage-gaps"></ul>
          </div>

          <button id="fill-btn" class="primary" type="button" disabled>Fill this page</button>
          <p id="fill-note" class="btn-note" hidden>Keep this tab open while filling.</p>

          <div id="fill-results" hidden>
            <div class="report-card">
              <p id="fill-report-time" class="report-time" hidden></p>
              <div id="fill-summary" class="bucket bucket-filled"></div>
              <div id="fill-skipped" class="bucket bucket-skipped" hidden></div>
              <div id="fill-manual" class="bucket bucket-manual" hidden></div>
            </div>
            <div id="fill-event-warn" class="error" hidden></div>
            <div id="gap-flag" class="gap-flag" hidden></div>
            <div id="submit-details" hidden>
              <div class="field submit-field">
                <label for="payer-ref-input">Payer reference / submission ID</label>
                <input
                  id="payer-ref-input"
                  type="text"
                  autocomplete="off"
                  placeholder="Optional - confirmation or tracking #"
                />
              </div>
              <div class="field submit-field">
                <label for="wip-note-input">Note</label>
                <textarea
                  id="wip-note-input"
                  rows="2"
                  placeholder="Optional - anything worth logging with this submission"
                ></textarea>
              </div>
              <div id="task-link" class="field submit-field" hidden>
                <label for="task-select">SOP task</label>
                <p id="task-link-single" class="task-link-single" hidden></p>
                <select id="task-select" hidden></select>
              </div>
            </div>
            <p id="submit-hint" class="btn-note" hidden>
              Submit the form on the portal yourself, then log it to the case:
            </p>
            <div id="dup-warn" class="dup-warn" hidden></div>
            <button id="mark-submitted" class="secondary" type="button" hidden>Mark submitted</button>
            <div id="submit-status" class="logged" hidden></div>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/src/sidepanel/main.ts"></script>
  </body>
</html>

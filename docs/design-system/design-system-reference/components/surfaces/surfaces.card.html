<!-- @dsCard group="Components" viewport="700x250" name="Surfaces" subtitle="Card — base container + header / content / footer (no shadow, 6px)" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); color: var(--text-primary); -webkit-font-smoothing: antialiased; font-variant-numeric: tabular-nums; }
  .wrap { padding: 20px; display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; align-items: start; }
  .card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-tile); }
  .ctitle { font-size: 14px; font-weight: 600; letter-spacing: -.01em; }
  .cdesc { font-size: 13px; color: var(--text-secondary); }
  .track { height: 6px; background: var(--color-surface-muted); border-radius: var(--radius-control); overflow: hidden; }
  .fill { height: 100%; background: var(--color-primary); border-radius: var(--radius-control); }
  .mono { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); }
  .btn { display: inline-flex; align-items: center; justify-content: center; height: 32px; padding: 0 12px; border-radius: var(--radius-control); font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; }
  .lbl { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 11px; }
</style>
</head>
<body>
  <div class="wrap">
    <div>
      <div class="lbl">Card — full composition</div>
      <div class="card">
        <div style="display:flex;flex-direction:column;gap:6px;padding:16px;"><div class="ctitle">Coverage</div><div class="cdesc">7 of 19 fields covered</div></div>
        <div style="padding:0 16px 16px;">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;"><span style="font-size:13px;">In-network</span><span class="mono">5 of 8</span></div>
          <div class="track"><div class="fill" style="width:62.5%;"></div></div>
        </div>
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:0 16px 16px;">
          <button class="btn" style="border:1px solid var(--color-border);background:var(--color-surface);color:var(--text-primary);">Skip</button>
          <button class="btn" style="border:1px solid var(--color-primary);background:var(--color-primary);color:#fff;">Fill form</button>
        </div>
      </div>
    </div>
    <div>
      <div class="lbl">Card — bare</div>
      <div class="card" style="padding:16px;">
        <div style="font-size:13px;font-weight:600;">Brian Hershberger, PT</div>
        <div class="mono" style="margin-top:3px;">NPI 1841293756</div>
        <div style="font-size:11px;color:var(--text-tertiary);margin-top:2px;">Outer Banks Rehab Group</div>
      </div>
    </div>
  </div>
</body>
</html>

<!-- @dsCard group="Components" viewport="700x320" name="Forms" subtitle="FormField wraps Input · Select · Textarea — default, focus, error, disabled" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); color: var(--text-primary); -webkit-font-smoothing: antialiased; font-variant-numeric: tabular-nums; }
  .wrap { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
  .lbl { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 12px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .flabel { font-size: 12px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--text-secondary); }
  .ctrl { height: 34px; padding: 0 10px; border: 1px solid var(--color-border); border-radius: var(--radius-control); background: var(--color-surface); font-size: 13px; color: var(--text-primary); font-family: inherit; width: 100%; }
  .hint { font-size: 12px; color: var(--text-tertiary); }
  .mono { font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="wrap">
    <div>
      <div class="lbl">Text input</div>
      <div class="grid">
        <div class="field">
          <label class="flabel">Middle name</label>
          <input class="ctrl" placeholder="Optional">
          <span class="hint">Default</span>
        </div>
        <div class="field">
          <label class="flabel">Last name</label>
          <input class="ctrl" value="Hershberger" style="border-color:var(--color-primary);outline:2px solid var(--focus-ring);">
          <span class="hint" style="color:var(--color-primary);">Focus · 1px ring</span>
        </div>
        <div class="field">
          <label class="flabel" style="color:var(--color-danger);">NPI</label>
          <input class="ctrl mono" value="18412" style="border-color:var(--color-danger);">
          <span class="hint" style="color:var(--color-danger);">Enter a valid 10-digit NPI</span>
        </div>
        <div class="field">
          <label class="flabel" style="color:var(--text-tertiary);">Provider ID</label>
          <input class="ctrl" value="PT-4471" disabled style="background:var(--color-surface-muted);color:var(--text-tertiary);cursor:not-allowed;">
          <span class="hint">Disabled</span>
        </div>
      </div>
    </div>
    <div class="grid" style="grid-template-columns:1fr 1fr;">
      <div>
        <div class="lbl">Select</div>
        <div class="field">
          <label class="flabel">Case status</label>
          <div style="position:relative;">
            <select class="ctrl" style="padding-right:30px;appearance:none;-webkit-appearance:none;"><option>Under review</option><option>Submitted</option></select>
            <span style="position:absolute;right:12px;top:12px;width:7px;height:7px;border-right:1.5px solid var(--text-secondary);border-bottom:1.5px solid var(--text-secondary);transform:rotate(45deg);pointer-events:none;"></span>
          </div>
        </div>
      </div>
      <div>
        <div class="lbl">Textarea</div>
        <div class="field">
          <label class="flabel">Note</label>
          <textarea class="ctrl" style="height:56px;padding:8px 10px;resize:none;line-height:1.45;">Called BCBS Kansas 6/28 — verification in progress.</textarea>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

<!-- @dsCard group="Components" viewport="700x120" name="Navigation" subtitle="Tabs — segmented bar, active lifts to white (1px border, no shadow)" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
  .tabs { display: inline-flex; align-items: center; gap: 2px; height: 34px; padding: 3px; background: var(--color-surface-muted); border-radius: var(--radius-tile); }
  .tab { display: inline-flex; align-items: center; justify-content: center; height: 28px; padding: 0 12px; border: 1px solid transparent; border-radius: var(--radius-control); font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text-secondary); }
  .tab.on { background: var(--color-surface); color: var(--text-primary); border-color: var(--color-border); }
</style>
</head>
<body>
  <div style="padding:20px;">
    <div class="tabs">
      <button class="tab on">Summary</button>
      <button class="tab">Matrix</button>
      <button class="tab">Contracts</button>
      <button class="tab">Roster</button>
    </div>
  </div>
</body>
</html>

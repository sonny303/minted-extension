<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; }

  .meta { width: 118px; flex: none; }
  .mname { font-size: 12px; font-weight: 500; }
  .mspec { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); }

</head>
<body>
  <div class="list">
    <div class="r"><div class="meta"><div class="mname">Page title</div><div class="mspec">16 / 600</div></div><div style="font-size:16px;font-weight:600;letter-spacing:-.01em;">Credentialing overview</div></div>
    <div class="r"><div class="meta"><div class="mname">Section heading</div><div class="mspec">14 / 600</div></div><div style="font-size:14px;font-weight:600;">Providers needing action</div></div>
    <div class="r"><div class="meta"><div class="mname">Body</div><div class="mspec">12 / 400</div></div><div style="font-size:12px;font-weight:400;">Three payers still need action before month end.</div></div>
    <div class="r"><div class="meta"><div class="mname">Label</div><div class="mspec">12 / upper</div></div><div style="font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary);">Provider status</div></div>
  </div>
</body>
</html>

<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces & structure" subtitle="Forest primary, warm-neutral surfaces, 1px borders" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
  .row { padding: 18px 20px; display: flex; gap: 22px; flex-wrap: wrap; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .tile { width: 96px; height: 52px; border-radius: var(--radius-tile); border: 1px solid var(--color-border); }
  .name { font-size: 12px; font-weight: 600; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="tile" style="background:var(--mp-forest-600);"></div><span class="name">Primary</span><span class="hex">#1B4D3E</span></div>
    <div class="sw"><div class="tile" style="background:var(--mp-forest-900);"></div><span class="name">Nav / sidebar</span><span class="hex">#0C2A1D</span></div>
    <div class="sw"><div class="tile" style="background:var(--mp-off-white);"></div><span class="name">Background</span><span class="hex">#FDFDFC</span></div>
    <div class="sw"><div class="tile" style="background:var(--mp-white);"></div><span class="name">Card</span><span class="hex">#FFFFFF</span></div>
    <div class="sw"><div class="tile" style="background:var(--mp-surface-muted);"></div><span class="name">Muted surface</span><span class="hex">#F5F4F1</span></div>
    <div class="sw"><div class="tile" style="background:var(--mp-border);"></div><span class="name">Border</span><span class="hex">#E8E5E0</span></div>
  </div>
</body>
</html>

<!-- @dsCard group="Colors" viewport="700x150" name="Text" subtitle="One warm neutral, three weights of value" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
  .row { padding: 18px 20px; display: flex; gap: 26px; flex-wrap: wrap; align-items: flex-start; }
  .item { display: flex; align-items: center; gap: 12px; }
  .tile { width: 40px; height: 40px; border-radius: var(--radius-tile); border: 1px solid var(--color-border); flex: none; }
  .name { font-size: 13px; font-weight: 600; }
  .use { font-size: 12px; color: var(--text-tertiary); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="tile" style="background:var(--mp-gray-900);"></div><div><div class="name">Primary</div><div class="use">Headings, values</div><div class="hex">#1F2937</div></div></div>
    <div class="item"><div class="tile" style="background:var(--mp-gray-500);"></div><div><div class="name">Secondary</div><div class="use">Body, descriptions</div><div class="hex">#6B7280</div></div></div>
    <div class="item"><div class="tile" style="background:var(--mp-gray-400);"></div><div><div class="name">Tertiary</div><div class="use">Meta, placeholders</div><div class="hex">#9CA3AF</div></div></div>
  </div>
</body>
</html>

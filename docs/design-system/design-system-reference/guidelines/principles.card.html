<!-- @dsCard group="Brand" viewport="700x170" name="Ground rules" subtitle="The constraints every component inherits" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
  .grid { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px 30px; }
  .rule { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .sq { width: 7px; height: 7px; background: var(--color-primary); flex: none; }
</style>
</head>
<body>
  <div class="grid">
    <div class="rule"><span class="sq"></span>Light mode only</div>
    <div class="rule"><span class="sq"></span>No gradients, anywhere</div>
    <div class="rule"><span class="sq"></span>No shadows on cards — 1px borders</div>
    <div class="rule"><span class="sq"></span>4px controls · 6px tiles</div>
    <div class="rule"><span class="sq"></span>Tabular figures on all numbers</div>
    <div class="rule"><span class="sq"></span>Tight, functional spacing</div>
  </div>
</body>
</html>

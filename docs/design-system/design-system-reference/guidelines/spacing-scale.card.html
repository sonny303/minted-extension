<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="Tight 4-based rhythm — 4 / 8 / 12 / 16 / 24" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
  .row { padding: 20px; display: flex; align-items: flex-end; gap: 24px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--color-primary); height: 44px; }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="width:4px;"></div><span class="n">4</span></div>
    <div class="col"><div class="bar" style="width:8px;"></div><span class="n">8</span></div>
    <div class="col"><div class="bar" style="width:12px;"></div><span class="n">12</span></div>
    <div class="col"><div class="bar" style="width:16px;"></div><span class="n">16</span></div>
    <div class="col"><div class="bar" style="width:24px;"></div><span class="n">24</span></div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--color-bg); font-family: var(--font-sans); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
  .row { padding: 20px; display: flex; gap: 16px; align-items: stretch; }
  .panel { flex: 1; border: 1px solid var(--color-border); border-radius: var(--radius-tile); display: flex; align-items: center; gap: 12px; padding: 22px; }
  .word { font-size: 18px; font-weight: 600; letter-spacing: -.01em; }
</style>
</head>
<body>
  <div class="row">
    <div class="panel" style="background:var(--color-surface);">
      <img src="../assets/logo-forest.png" alt="Minted Panel" style="height:40px;width:auto;display:block;">
      <span class="word">Minted Panel</span>
    </div>
    <div class="panel" style="background:var(--color-nav);border-color:var(--color-nav);">
      <img src="../assets/logo-white.png" alt="Minted Panel" style="height:34px;width:auto;display:block;">
      <span class="word" style="color:#fff;">Minted Panel</span>
    </div>
  </div>
</body>
</html>
